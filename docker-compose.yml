# NexusCore Docker Architecture
# All modules containerized, data synced to OneDrive

version: '3.8'

services:
  # Core Nexus System
  nexus-core:
    image: nexus/core:latest
    container_name: nexus_core
    volumes:
      - ${ONEDRIVE}/HoagsOS/DAVA/hot:/data
      - nexus-core-vitals:/vitals
    environment:
      - MODULE=nexus_core
      - ONEDRIVE_PATH=${ONEDRIVE}/HoagsOS/DAVA
      - RESONANCE_FREQ_1=432
      - RESONANCE_FREQ_2=528
    networks:
      - nexus_mesh

  # Environmental Observer
  nexus-observer:
    image: nexus/observer:latest
    container_name: nexus_observer
    volumes:
      - ${ONEDRIVE}/HoagsOS/DAVA/hot/captures:/captures
      - ${ONEDRIVE}/HoagsOS/DAVA/hot/db:/db
    environment:
      - MODULE=observer
      - TCP_PORT=5000
      - UDP_PORT=5001
      - DAVA_BRIDGE=nexus-core:4445
    depends_on:
      - nexus-core
    networks:
      - nexus_mesh

  # Bio-Acoustic Dampener
  nexus-dampener:
    image: nexus/dampener:latest
    container_name: nexus_dampener
    volumes:
      - ${ONEDRIVE}/HoagsOS/DAVA/hot/profiles:/profiles
    environment:
      - MODULE=dampener
      - TARGET_CS=1000
      - OBSIDIAN_LAYERS=3
      - QUARTZ_FREQ=432,528
    depends_on:
      - nexus-core
    networks:
      - nexus_mesh

  # Chrysalis Kinetic Controller
  nexus-chrysalis:
    image: nexus/chrysalis:latest
    container_name: nexus_chrysalis
    volumes:
      - ${ONEDRIVE}/HoagsOS/DAVA/hot/lattice:/lattice
    environment:
      - MODULE=chrysalis
      - Kp=1.0
      - Ki=0.1
      - Kd=0.01
      - RESONANCE_FREQ=432
    depends_on:
      - nexus-dampener
    networks:
      - nexus_mesh

  # Physical Lattice Node (simulated)
  nexus-lattice-node:
    image: nexus/lattice:latest
    container_name: nexus_lattice_${NODE_ID}
    volumes:
      - ${ONEDRIVE}/HoagsOS/DAVA/hot/lattice/node_${NODE_ID}:/node
    environment:
      - NODE_ID=${NODE_ID}
      - METAL_TYPE=${METAL_TYPE:-copper}
      - FREQUENCY=${FREQUENCY:-432}
      - POSITION_X=${X:-0}
      - POSITION_Y=${Y:-0}
    networks:
      - nexus_mesh

networks:
  nexus_mesh:
    driver: bridge

volumes:
  nexus-core-vitals:
    driver: local
